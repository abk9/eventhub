services:
  - type: web
    name: eventhub-api
    runtime: python
    rootDir: Django
    buildCommand: pip install -r requirements.txt && python Src/manage.py collectstatic --no-input && python Src/manage.py migrate && python Src/manage.py createsuperuser --no-input || true
    startCommand: gunicorn --chdir Src EventHub.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

databases:
  - name: eventhub-db
    databaseName: eventhub
    user: eventhub
